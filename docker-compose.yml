services:
  postgres:
    image: postgres:16
    container_name: devdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - devdesk_postgres_data:/var/lib/postgresql/data

volumes:
  devdesk_postgres_data:
